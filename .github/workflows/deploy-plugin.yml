name: Deploy Lampa Plugin

on:
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.github/workflows/deploy-plugin.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build plugin
        run: |
          mkdir -p dist
          
          cp plugin/burst_bridge.js dist/burst_bridge.js
          
          npx --yes terser plugin/burst_bridge.js \
            --compress --mangle \
            --output dist/burst_bridge.min.js
          
          echo "{
            \"name\": \"burst_bridge\",
            \"version\": \"$(date +%Y.%m.%d)-$(echo $GITHUB_SHA | cut -c1-7)\",
            \"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
            \"files\": {
              \"full\": \"burst_bridge.js\",
              \"min\": \"burst_bridge.min.js\"
            }
          }" > dist/version.json
          
          cat > dist/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Burst Bridge — Lampa Plugin</title></head>
          <body>
            <h1>Burst Bridge</h1>
            <p>Lampa TV torrent search plugin powered by Elementum Burst providers.</p>
            <h3>Plugin URLs</h3>
            <ul>
              <li><a href="burst_bridge.js">burst_bridge.js</a> (full)</li>
              <li><a href="burst_bridge.min.js">burst_bridge.min.js</a> (minified)</li>
              <li><a href="version.json">version.json</a></li>
            </ul>
            <h3>Setup</h3>
            <p>Add this URL as a plugin in Lampa:</p>
            <code id="url"></code>
            <script>
              document.getElementById('url').textContent =
                window.location.href.replace('index.html','') + 'burst_bridge.min.js';
            </script>
          </body>
          </html>
          EOF
          
          ls -la dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
